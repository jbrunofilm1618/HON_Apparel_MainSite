<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HŌN | Athletic Apparel for the Inner Person</title>
  <meta name="description" content="Training for Reigning. Premium athletic apparel rooted in the earliest traditions of the Christian faith. ὁ ὤν — The One Who Is.">

  <!-- Open Graph -->
  <meta property="og:title" content="HŌN | Athletic Apparel for the Inner Person">
  <meta property="og:description" content="Training for Reigning. Premium athletic apparel rooted in the earliest traditions of the Christian faith.">
  <meta property="og:image" content="https://honapparel.com/img/og-image.jpg">
  <meta property="og:url" content="https://honapparel.com/">
  <meta property="og:type" content="website">

  <!-- Favicon -->
  <link rel="icon" href="/img/favicon.ico">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="/css/splash.css">

  <!-- Kit (email) -->
  <script src="https://f.convertkit.com/ckjs/ck.5.js"></script>

  <!-- Google Analytics 4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-XXXXXXXXXX');
  </script>
</head>
<body>

  <main class="splash">

    <!-- Brand Mark -->
    <div class="brand-mark fade-in">
      <span class="brand-greek" lang="grc">ὁ ὤν</span>
    </div>

    <!-- Wordmark -->
    <h1 class="wordmark fade-in delay-1">HŌN</h1>

    <!-- Tagline -->
    <p class="tagline fade-in delay-2">Training for Reigning</p>

    <!-- Descriptor -->
    <p class="descriptor fade-in delay-3">Athletic Apparel for the Inner Person</p>

    <!-- Divider -->
    <hr class="gold-rule fade-in delay-3" aria-hidden="true">

    <!-- Ides of March Teaser -->
    <p class="ides-teaser fade-in delay-4">Beware the Ides of March</p>
    <p class="coming-soon fade-in delay-4">Something is coming &mdash; March 15, 2026</p>

    <!-- Email Capture -->
    <div class="email-section fade-in delay-5">
      <p class="email-prompt">Get on the list. Be first to know.</p>
      <form class="email-form" action="https://app.kit.com/forms/9154078/subscriptions" method="POST" data-sv-form="9154078" data-uid="4448e44084" data-format="inline" data-version="5">
        <input type="email" name="email_address" placeholder="Your email" required aria-label="Email address">
        <button type="submit">I'm In</button>
      </form>
      <p class="email-privacy">No spam. Unsubscribe anytime.</p>
      <div class="sr-only" aria-live="polite" id="form-status"></div>
    </div>

    <!-- Divider -->
    <hr class="gold-rule fade-in delay-5" aria-hidden="true">

    <!-- CTA -->
    <a href="https://hon-apparel.myshopify.com" class="btn-shop fade-in delay-5" target="_blank" rel="noopener">
      Shop Now <span aria-hidden="true">&rarr;</span><span class="sr-only"> (opens in new tab)</span>
    </a>

  </main>

  <!-- Footer -->
  <footer class="splash-footer fade-in delay-5">
    <p class="footer-origin"><span lang="grc">ὁ ὤν</span> — The One Who Is</p>
    <p class="footer-legal">&copy; 2026 HŌN. Salinas, California.</p>
  </footer>

  <!-- Kit form handler — submit via fetch, show confirmation inline -->
  <script>
    document.querySelector('.email-form').addEventListener('submit', function(e) {
      e.preventDefault();
      var form = this;
      var btn = form.querySelector('button');
      var input = form.querySelector('input[type="email"]');
      var status = document.getElementById('form-status');
      var email = input.value;
      btn.disabled = true;
      btn.textContent = 'Sending...';
      status.textContent = 'Submitting your email...';
      fetch(form.action, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'email_address=' + encodeURIComponent(email)
      }).then(function() {
        btn.textContent = "You're On The List";
        input.disabled = true;
        input.value = '';
        status.textContent = "Success! You're on the list.";
      }).catch(function() {
        btn.textContent = "You're On The List";
        input.disabled = true;
        input.value = '';
        status.textContent = "Success! You're on the list.";
      });
    });
  </script>

</body>
</html>
